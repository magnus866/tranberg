  <!-- Document Title -->
  <text x="80" y="230" class="doc-title">Utbildningsplan: Biodynamisk Kraniosakralterapi</text>

  <!-- Document Content Example -->
  <g transform="translate(80, 270)">
    <text x="0" y="0" class="doc-body-bold">Inledning och Filosofi</text>
    <text x="0" y="20" class="doc-body">Denna utbildningsplan beskriver upplägget för den treåriga yrkesutbildningen vid Tranberg</text>
    <text x="0" y="38" class="doc-body">Institut AB. Utbildningen vänder sig till terapeuter och vårdpersonal som vill fördjupa sig</text>
    <text x="0" y="56" class="doc-body">inom biodynamisk kraniosakralosteopati och människokroppens inneboende förmåga till självreglering.</text>

    <text x="0" y="90" class="doc-body-bold">Utbildningens tre pelare:</text>
    <text x="0" y="110" class="doc-body"><tspan class="doc-body-bold">1. Behandling: </tspan>Teoretisk förståelse kombinerad med omfattande klinisk praktik under handledning.</text>
    <text x="0" y="128" class="doc-body"><tspan class="doc-body-bold">2. Utbildning: </tspan>Föreläsningar, litteraturstudier, anatomi och embryologi ur ett biodynamiskt perspektiv.</text>
    <text x="0" y="146" class="doc-body"><tspan class="doc-body-bold">3. Kunskap: </tspan>Vetenskaplig förankring, etiskt bemötande och personlig utveckling som terapeut.</text>

    <text x="0" y="180" class="doc-body">Vår filosofi utgår från att hälsa inte bara är frånvaro av sjukdom, utan närvaro av livets primära</text>
    <text x="0" y="198" class="doc-body">respiratoriska rörelse. Genom närvaro, stillhet och varsam beröring kan vi stödja kroppens</text>
    <text x="0" y="216" class="doc-body">naturliga återgång till balans och helhet.</text>

    <text x="0" y="250" class="doc-body">Utbildningen leder till diplomering och certifiering som Biodynamisk Kraniosakralterapeut.</text>
    
