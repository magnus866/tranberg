<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&amp;family=Inter:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" fill="#F5F3EE"/>

  <!-- Symbol placeholder: circle centred at x=140 -->
  <circle cx="140" cy="120" r="96" fill="none" stroke="#6E7168" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text
    x="140"
    y="112"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="10"
    fill="#6E7168"
    letter-spacing="1">Symbol</text>
  <text
    x="140"
    y="128"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="10"
    fill="#6E7168"
    letter-spacing="1">placeholder</text>

  <!-- Vertical divider -->
  <line x1="265" y1="32" x2="265" y2="208" stroke="#B28C5A" stroke-width="0.6" opacity="0.5"/>

  <!-- Wordmark group, right side centred at x=532 -->
  <!-- TRANBERG -->
  <text
    x="532"
    y="100"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-size="34"
    font-weight="500"
    letter-spacing="12"
    fill="#26332B">TRANBERG</text>

  <!-- Ruled lines flanking INSTITUT AB -->
  <line x1="296" y1="118" x2="432" y2="118" stroke="#B28C5A" stroke-width="0.8"/>
  <text
    x="532"
    y="123"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="6"
    fill="#26332B">INSTITUT AB</text>
  <line x1="632" y1="118" x2="768" y2="118" stroke="#B28C5A" stroke-width="0.8"/>

  <!-- Tagline -->
  <text
    x="532"
    y="150"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="8"
    font-weight="300"
    letter-spacing="4"
    fill="#6E7168">I SYMBIOS MED MÄNNISKANS NATUR</text>
</svg>
