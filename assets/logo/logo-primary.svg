<!-- ============================================================
     TRANBERG INSTITUT AB – PRIMARY LOGO (Symbol + Wordmark + Tagline)
     Horizontal layout. Symbol left, wordmark + tagline right.
     Brand Book: Primär Logotyp
     ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-labelledby="logo-primary-title">
  <title id="logo-primary-title">Tranberg Institut AB – Primär Logotyp</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .logo-wordmark { font-family: 'Playfair Display', Georgia, serif; fill: #26332B; }
      .logo-rule     { stroke: #26332B; stroke-width: 0.8; }
      .logo-tagline  { font-family: 'Inter', system-ui, sans-serif; fill: #6E7168; }
    </style>
  </defs>

  <!-- Symbol (60x60, centred vertically) -->
  <g transform="translate(0, 0) scale(0.565)">
    <!-- Outer ring -->
    <circle cx="100" cy="100" r="82" fill="none" stroke="#26332B" stroke-width="1.4"/>
    <!-- Form 1 – Gold -->
    <path d="M 100 26 C 126 26 150 44 160 68 C 168 88 162 112 146 126 C 134 136 118 138 106 132 C 96 127 90 116 90 104 C 90 90 98 78 108 70 C 118 62 126 50 116 38 C 111 32 106 27 100 26 Z" fill="#B28C5A"/>
    <!-- Form 2 – Green -->
    <path d="M 100 174 C 74 174 50 156 40 132 C 32 112 38 88 54 74 C 66 64 82 62 94 68 C 104 73 110 84 110 96 C 110 110 102 122 92 130 C 82 138 74 150 84 162 C 89 168 94 173 100 174 Z" fill="#26332B"/>
    <!-- Centre dot -->
    <circle cx="100" cy="100" r="6" fill="#26332B"/>
    <!-- Decorative dots -->
    <circle cx="100" cy="15" r="3.5" fill="#B28C5A"/>
    <circle cx="100" cy="185" r="3.5" fill="#B28C5A"/>
    <circle cx="179" cy="108" r="2.2" fill="#26332B"/>
  </g>

  <!-- Wordmark: TRANBERG -->
  <text x="76" y="46" class="logo-wordmark" font-size="28" letter-spacing="6" font-weight="400">TRANBERG</text>

  <!-- Rule line left + INSTITUT AB + rule line right -->
  <line x1="76"  y1="60" x2="107" y2="60" class="logo-rule"/>
  <text x="112" y="64" class="logo-wordmark" font-size="9" letter-spacing="4" font-weight="400">INSTITUT AB</text>
  <line x1="203" y1="60" x2="234" y2="60" class="logo-rule"/>

  <!-- Tagline -->
  <text x="76" y="82" class="logo-tagline" font-size="6.5" letter-spacing="3.5">I SYMBIOS MED MÄNNISKANS NATUR</text>

</svg>
