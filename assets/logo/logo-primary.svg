<!-- ============================================================
     TRANBERG INSTITUT AB — PRIMARY LOGO  v2.0
     Brand Book: Primär logotyp
     Layout: Symbol (left) + Wordmark + Tagline (right)
     ViewBox: 960 × 220
     ============================================================ -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 960 220"
  preserveAspectRatio="xMidYMid meet"
  shape-rendering="geometricPrecision"
  role="img"
  aria-labelledby="ti-primary-title">

  <title id="ti-primary-title">Tranberg Institut AB — Primär Logotyp</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .ti-name    { font-family: 'Playfair Display', 'Palatino Linotype', Georgia, serif;
                    font-weight: 400; fill: #26332B; font-size: 52px; letter-spacing: 12px; }
      .ti-sub     { font-family: 'Inter', system-ui, sans-serif;
                    font-weight: 400; fill: #26332B; font-size: 15px; letter-spacing: 7px; }
      .ti-tag     { font-family: 'Inter', system-ui, sans-serif;
                    font-weight: 300; fill: #6E7168; font-size: 11px; letter-spacing: 5px; }
      .ti-rule    { stroke: #26332B; stroke-width: 1; }
    </style>
  </defs>

  <!-- Symbol: 200×200 placed at left, scaled to fit 200px height, centred in 220px tall box -->
  <g transform="translate(10, 10) scale(0.5)">
    <circle cx="200" cy="200" r="166" fill="none" stroke="#26332B" stroke-width="2.4"/>
    <path d="M 200,52 C 255,52 308,90 326,144 C 342,190 328,242 296,268 C 272,288 240,292 218,278 C 198,266 186,244 186,220 C 186,192 202,168 222,152 C 242,136 258,112 240,80 C 230,64 216,52 200,52 Z" fill="#B28C5A"/>
    <path d="M 200,348 C 145,348 92,310 74,256 C 58,210 72,158 104,132 C 128,112 160,108 182,122 C 202,134 214,156 214,180 C 214,208 198,232 178,248 C 158,264 142,288 160,320 C 170,336 184,348 200,348 Z" fill="#26332B"/>
    <circle cx="200" cy="200" r="11"  fill="#26332B"/>
    <circle cx="200" cy="31"  r="6.5" fill="#B28C5A"/>
    <circle cx="200" cy="369" r="6.5" fill="#B28C5A"/>
    <circle cx="362" cy="234" r="4"   fill="#26332B"/>
  </g>

  <!-- Wordmark block — left-aligned at x=230 -->
  <!-- TRANBERG -->
  <text x="230" y="84" class="ti-name">TRANBERG</text>

  <!-- — INSTITUT AB — with rules -->
  <line x1="230" y1="106" x2="295" y2="106" class="ti-rule"/>
  <text x="308" y="113" class="ti-sub">INSTITUT AB</text>
  <line x1="503" y1="106" x2="568" y2="106" class="ti-rule"/>

  <!-- Tagline -->
  <text x="230" y="148" class="ti-tag">I SYMBIOS MED MÄNNISKANS NATUR</text>

</svg>
