<!-- ============================================================
     TRANBERG INSTITUT AB — VERTICAL LOGO  v2.0
     Brand Book: Vertikal logotyp
     Layout: Symbol centred top, wordmark below, tagline below
     ViewBox: 500 × 580
     ============================================================ -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 580"
  preserveAspectRatio="xMidYMid meet"
  shape-rendering="geometricPrecision"
  role="img"
  aria-labelledby="ti-vertical-title">

  <title id="ti-vertical-title">Tranberg Institut AB — Vertikal Logotyp</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .ti-name-v  { font-family: 'Playfair Display', 'Palatino Linotype', Georgia, serif;
                    font-weight: 400; fill: #26332B; font-size: 52px; letter-spacing: 12px;
                    text-anchor: middle; }
      .ti-sub-v   { font-family: 'Inter', system-ui, sans-serif;
                    font-weight: 400; fill: #26332B; font-size: 14px; letter-spacing: 7px;
                    text-anchor: middle; }
      .ti-tag-v   { font-family: 'Inter', system-ui, sans-serif;
                    font-weight: 300; fill: #6E7168; font-size: 10.5px; letter-spacing: 4.5px;
                    text-anchor: middle; }
      .ti-rule    { stroke: #26332B; stroke-width: 1; }
    </style>
  </defs>

  <!-- Symbol centred horizontally, positioned at top -->
  <g transform="translate(50, 20) scale(1)">
    <circle cx="200" cy="200" r="166" fill="none" stroke="#26332B" stroke-width="2.4"/>
    <path d="M 200,52 C 255,52 308,90 326,144 C 342,190 328,242 296,268 C 272,288 240,292 218,278 C 198,266 186,244 186,220 C 186,192 202,168 222,152 C 242,136 258,112 240,80 C 230,64 216,52 200,52 Z" fill="#B28C5A"/>
    <path d="M 200,348 C 145,348 92,310 74,256 C 58,210 72,158 104,132 C 128,112 160,108 182,122 C 202,134 214,156 214,180 C 214,208 198,232 178,248 C 158,264 142,288 160,320 C 170,336 184,348 200,348 Z" fill="#26332B"/>
    <circle cx="200" cy="200" r="11"  fill="#26332B"/>
    <circle cx="200" cy="31"  r="6.5" fill="#B28C5A"/>
    <circle cx="200" cy="369" r="6.5" fill="#B28C5A"/>
    <circle cx="362" cy="234" r="4"   fill="#26332B"/>
  </g>

  <!-- TRANBERG -->
  <text x="250" y="468" class="ti-name-v">TRANBERG</text>

  <!-- Rules + INSTITUT AB -->
  <line x1="65"  y1="488" x2="148" y2="488" class="ti-rule"/>
  <text x="250" y="496" class="ti-sub-v">INSTITUT AB</text>
  <line x1="352" y1="488" x2="435" y2="488" class="ti-rule"/>

  <!-- Tagline -->
  <text x="250" y="526" class="ti-tag-v">I SYMBIOS MED</text>
  <text x="250" y="544" class="ti-tag-v">MÄNNISKANS NATUR</text>

</svg>
