  <line x1="288" y1="318" x2="380" y2="318" stroke="#B28C5A" stroke-width="0.8"/>

  <!-- Tagline -->
  <text
    x="220"
    y="356"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
