<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" width="440" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&amp;family=Inter:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="440" height="480" fill="#F5F3EE"/>

  <!-- Symbol placeholder circle, centred top -->
  <circle cx="220" cy="122" r="96" fill="none" stroke="#6E7168" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text
    x="220"
    y="114"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="10"
    fill="#6E7168"
    letter-spacing="1">Symbol</text>
  <text
    x="220"
    y="130"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="10"
    fill="#6E7168"
    letter-spacing="1">placeholder</text>

  <!-- Gold separator line -->
  <line x1="120" y1="244" x2="320" y2="244" stroke="#B28C5A" stroke-width="0.8" opacity="0.6"/>

  <!-- TRANBERG -->
  <text
    x="220"
    y="296"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
