<!-- ============================================================
     TRANBERG INSTITUT AB — WORDMARK ONLY  v2.0
     Brand Book: Endast Ordmärke
     No symbol. Typography with ruled lines.
     ViewBox: 680 × 110
     ============================================================ -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 680 110"
  preserveAspectRatio="xMidYMid meet"
  shape-rendering="geometricPrecision"
  role="img"
  aria-labelledby="ti-wordmark-title">

  <title id="ti-wordmark-title">Tranberg Institut AB — Ordmärke</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .ti-name-w  { font-family: 'Playfair Display', 'Palatino Linotype', Georgia, serif;
                    font-weight: 400; fill: #26332B; font-size: 54px; letter-spacing: 14px;
                    text-anchor: middle; }
      .ti-sub-w   { font-family: 'Inter', system-ui, sans-serif;
                    font-weight: 400; fill: #26332B; font-size: 15px; letter-spacing: 7px;
                    text-anchor: middle; }
      .ti-rule    { stroke: #26332B; stroke-width: 1; }
    </style>
  </defs>

  <text x="340" y="60" class="ti-name-w">TRANBERG</text>

  <line x1="80"  y1="80" x2="195" y2="80" class="ti-rule"/>
  <text x="340" y="88" class="ti-sub-w">INSTITUT AB</text>
  <line x1="485" y1="80" x2="600" y2="80" class="ti-rule"/>

</svg>
