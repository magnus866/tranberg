  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 400"
  preserveAspectRatio="xMidYMid meet"
  shape-rendering="geometricPrecision"
  role="img"
  aria-labelledby="ti-white-title">

  <title id="ti-white-title">Tranberg Institut AB — Symbol (vit version)</title>

  <rect width="400" height="400" fill="#26332B"/>

  <circle cx="200" cy="200" r="166" fill="none" stroke="#F5F3EE" stroke-width="2.4"/>

