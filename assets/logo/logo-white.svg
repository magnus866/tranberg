  <circle cx="200" cy="200" r="11"  fill="#F5F3EE"/>
  <circle cx="200" cy="31"  r="6.5" fill="#B28C5A"/>
  <circle cx="200" cy="369" r="6.5" fill="#B28C5A"/>
  <circle cx="362" cy="234" r="4"   fill="#F5F3EE"/>

